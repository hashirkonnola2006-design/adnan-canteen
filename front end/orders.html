<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Orders | RUCHI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { "primary": "#9f4122", "background": "#fff5f2", "accent": "#ff8a65", "teal": "#00bfae" } } } }
    </script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="./firebase-config.js"></script>
    <style>
        :root {
            --primary: #9f4122;
            --primary-light: #fff5f2;
            --accent: #ff8a65;
            --surface: #ffffff;
            --background: #fafafa;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f3f4f6; 
            scroll-behavior: smooth; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            justify-content: center;
            color: #1a1a1a;
        }

        .mobile-container { 
            width: 100%; 
            max-width: 414px; 
            height: 100vh; 
            background-color: var(--background); 
            position: relative; 
            overflow-x: hidden; 
            overflow-y: auto; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); 
            padding-bottom: 120px;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .glass-card { 
            background: var(--surface); 
            border: 1px solid rgba(0, 0, 0, 0.03);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-up { animation: fadeUp 0.5s ease forwards; }

        .nav-active { 
            color: var(--primary); 
            background: var(--primary-light);
            box-shadow: 0 4px 12px rgba(159, 65, 34, 0.1);
        }

        .nav-inactive { color: #94a3b8; }

        .nav-item {
            position: relative;
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            -webkit-tap-highlight-color: transparent;
        }

        .tab-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <header class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-[414px] z-40 bg-white/80 backdrop-blur-2xl shadow-sm px-5 py-4 pb-3">
            <h1 class="text-xl font-black text-gray-900 tracking-tight leading-none mb-4">My Orders</h1>
            <div class="flex gap-2">
                <button onclick="setTab('pending')" id="tab-pending" class="flex-1 py-2 rounded-xl text-xs font-bold uppercase tracking-widest bg-primary text-white transition-all shadow-sm">Pending</button>
                <button onclick="setTab('completed')" id="tab-completed" class="flex-1 py-2 rounded-xl text-xs font-bold uppercase tracking-widest bg-white text-gray-500 transition-all border border-gray-200">History</button>
            </div>
        </header>

        <main class="relative z-10 px-5 pt-32 pb-6">
            <div id="loading" class="text-center py-10"><span class="material-symbols-outlined animate-spin text-primary">autorenew</span></div>
            <div id="orders-list" class="space-y-4"></div>
        </main>

        <!-- Order QR Modal -->
        <div id="order-qr-modal" class="fixed inset-0 z-50 bg-gray-900/40 backdrop-blur-sm transition-opacity duration-300 opacity-0 pointer-events-none flex items-center justify-center px-4">
            <div class="w-full max-w-[340px] bg-white rounded-3xl p-6 transform transition-transform duration-300 scale-95 shadow-2xl flex flex-col items-center text-center" id="order-qr-sheet">
                <div class="flex justify-between items-center w-full mb-4">
                    <h3 class="text-lg font-black text-gray-900" id="qr-order-id">Order ID</h3>
                    <button onclick="closeQRModal()" class="w-8 h-8 flex items-center justify-center bg-gray-100 rounded-full"><span class="material-symbols-outlined">close</span></button>
                </div>
                <p class="text-xs font-bold text-gray-500 mb-6">Scan this QR at the counter to print your bill.</p>
                <div class="p-3 bg-white border-2 border-gray-100 rounded-2xl shadow-sm mb-6" id="order-qrcode"></div>
            </div>
        </div>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-40px)] max-w-[374px] z-50 h-20 bg-white/95 backdrop-blur-xl rounded-[2.5rem] border border-gray-100 shadow-[0_20px_50px_rgba(0,0,0,0.1)] flex items-center px-3">
            <a href="menu.html" class="nav-item">
                <div class="nav-inactive flex flex-col items-center justify-center w-14 h-14 transition-all duration-300 hover:scale-110">
                    <span class="material-symbols-outlined text-[24px]">home</span>
                    <span class="text-[9px] font-black uppercase tracking-[0.05em] mt-0.5">Home</span>
                </div>
            </a>
            <a href="orders.html" class="nav-item">
                <div class="nav-active flex flex-col items-center justify-center rounded-3xl w-14 h-14 transition-all duration-300">
                    <span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1">receipt_long</span>
                    <span class="text-[9px] font-black uppercase tracking-[0.05em] mt-0.5">Orders</span>
                </div>
            </a>
            <a href="profile.html" class="nav-item">
                <div class="nav-inactive flex flex-col items-center justify-center w-14 h-14 transition-all duration-300 hover:scale-110">
                    <span class="material-symbols-outlined text-[24px]">person</span>
                    <span class="text-[9px] font-black uppercase tracking-[0.05em] mt-0.5">Profile</span>
                </div>
            </a>
        </nav>
    </div>

    <script>
        let allOrders = [];
        let currentTab = 'pending';

        async function fetchOrders() {
            if (typeof firebase === "undefined" || !firebase.database) return;
            const stId = localStorage.getItem('studentId');
            
            firebase.database().ref('orders').on('value', snap => {
                const data = snap.val();
                if (data) {
                    // Filter orders belonging to this student
                    allOrders = Object.keys(data)
                        .map(key => ({ _id: key, ...data[key] }))
                        .filter(o => o.studentId === stId);
                } else {
                    allOrders = [];
                }
                document.getElementById('loading').style.display = 'none';
                renderOrders();
            }, err => {
                document.getElementById('loading').innerHTML = `<p class="text-xs text-red-500 font-bold">Connection failed.</p>`;
            });
        }

        function setTab(tab) {
            currentTab = tab;
            document.getElementById('tab-pending').className = tab === 'pending' ? "flex-1 py-2 rounded-xl text-xs font-bold uppercase tracking-widest bg-primary text-white transition-all shadow-sm" : "flex-1 py-2 rounded-xl text-xs font-bold uppercase tracking-widest bg-white text-gray-500 transition-all border border-gray-200";
            document.getElementById('tab-completed').className = tab === 'completed' ? "flex-1 py-2 rounded-xl text-xs font-bold uppercase tracking-widest bg-primary text-white transition-all shadow-sm" : "flex-1 py-2 rounded-xl text-xs font-bold uppercase tracking-widest bg-white text-gray-500 transition-all border border-gray-200";
            renderOrders();
        }

        function renderOrders() {
            const list = document.getElementById('orders-list');
            list.innerHTML = '';
            const filtered = allOrders.filter(o => currentTab === 'pending' ? o.status === 'pending' : o.status !== 'pending');

            if(filtered.length === 0) {
                list.innerHTML = `<div class="text-center py-10"><p class="text-sm font-bold text-gray-500">No ${currentTab} orders.</p></div>`;
                return;
            }

            filtered.forEach((order, i) => {
                const itemsStr = Object.values(order.items || {}).map(d => `${d.qty}x ${d.name}`).join(', ');
                list.innerHTML += `
                <div class="glass-card rounded-[2rem] p-5 fade-up" style="animation-delay: ${i*50}ms">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] font-black text-gray-500 bg-gray-50 border border-gray-100 px-3 py-1 rounded-full uppercase tracking-widest">#${order.id}</span>
                        <span class="text-lg font-black text-primary">₹${order.total}</span>
                    </div>
                    <div class="mb-4">
                        <p class="text-[13px] font-bold text-gray-800 leading-relaxed">${itemsStr}</p>
                    </div>
                    <div class="flex justify-between items-center pt-4 border-t border-gray-50">
                        <span class="text-[10px] font-extrabold uppercase tracking-widest text-gray-400">${order.paymentMethod === 'cash' ? 'Pay at Counter' : 'UPI Paid'}</span>
                        <div class="flex items-center gap-2">
                            ${order.status === 'pending' && !order.qr_scanned ? `<button onclick="showOrderQR('${order.id}')" class="text-[10px] font-black bg-gray-900 text-white px-4 py-2 rounded-xl flex items-center gap-2 active:scale-95 transition-all uppercase tracking-widest shadow-lg shadow-gray-900/10"><span class="material-symbols-outlined text-[16px]">qr_code</span> View QR</button>` : ''}
                            <span class="text-[10px] font-black uppercase tracking-[0.1em] px-3 py-1.5 rounded-lg ${order.status === 'completed' ? 'bg-green-50 text-green-600' : order.status === 'cancelled' ? 'bg-red-50 text-red-600' : 'bg-yellow-50 text-yellow-600'} border border-current opacity-80">${order.status}</span>
                        </div>
                    </div>
                </div>`;
            });
        }

        function showOrderQR(orderId) {
            const modal = document.getElementById('order-qr-modal');
            const sheet = document.getElementById('order-qr-sheet');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            sheet.classList.remove('scale-95');
            sheet.classList.add('scale-100');
            document.getElementById('qr-order-id').innerText = orderId;

            document.getElementById('order-qrcode').innerHTML = "";
            new QRCode(document.getElementById('order-qrcode'), { 
                text: JSON.stringify({ orderId: orderId, status: "pending" }), 
                width: 180, 
                height: 180,
                colorDark : "#000000",
                colorLight : "#ffffff"
            });
        }

        function closeQRModal() {
            const modal = document.getElementById('order-qr-modal');
            const sheet = document.getElementById('order-qr-sheet');
            modal.classList.add('opacity-0', 'pointer-events-none');
            sheet.classList.remove('scale-100');
            sheet.classList.add('scale-95');
        }

        window.onload = () => { fetchOrders(); setInterval(fetchOrders, 10000); };
    </script>
</body>
</html>
