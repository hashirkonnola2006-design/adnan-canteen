<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Welcome | RUCHI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { "primary": "#9f4122", "background": "#fff5f2", "accent": "#ff8a65", "teal": "#00bfae" } } } }
    </script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍱</text></svg>">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #000; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            justify-content: center;
        }

        .mobile-container { 
            width: 100%; 
            max-width: 414px; 
            height: 100vh; 
            background-color: #fff; 
            position: relative; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('./welcome-hero.png');
            background-size: cover;
            background-position: center;
            filter: brightness(0.7);
            transition: transform 10s linear;
        }

        .mobile-container:hover .hero-bg {
            transform: scale(1.1);
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            margin-top: 10vh;
            margin-bottom: auto;
            padding: 2rem;
            color: white;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .glass-sheet {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem;
            padding: 2rem;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate-fade-in {
            animation: fadeIn 1s ease forwards;
        }

        select {
            -webkit-appearance: none;
            appearance: none;
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <div class="hero-bg"></div>
        <div class="overlay"></div>

        <div class="content">
            <div class="mb-8 animate-fade-in flex flex-col items-center">
                <div class="flex items-center justify-center gap-3 mb-6">
                    <div class="w-12 h-12 bg-primary rounded-2xl flex items-center justify-center shadow-xl shadow-primary/30">
                        <span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings: 'FILL' 1;">restaurant</span>
                    </div>
                </div>
                <span class="text-sm font-black uppercase tracking-[0.4em] text-white/60 mb-2">Welcome to</span>
                <h1 class="text-7xl font-black leading-tight tracking-tighter mb-4 text-white">RUCHI</h1>
                <p class="text-sm font-medium text-white/70 max-w-[280px] leading-relaxed">Fresh, healthy, and delicious meals served right at your college.</p>
            </div>

            <div class="glass-sheet w-full max-w-[340px]">
                <div class="mb-6">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-white/50 mb-2 block ml-1">Location</label>
                    <div class="relative">
                        <select id="collegeSelect" class="w-full bg-white/10 border border-white/20 rounded-2xl px-5 py-4 text-sm font-bold text-white outline-none focus:ring-2 focus:ring-primary focus:bg-white/20 transition-all">
                            <option value="COET Thalassery" class="text-gray-900">COET Thalassery</option>
                        </select>
                        <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-white/50 pointer-events-none">expand_more</span>
                    </div>
                </div>

                <button onclick="saveCollege()" class="w-full bg-primary hover:bg-accent text-white font-black py-5 rounded-2xl shadow-[0_15px_30px_rgba(159,65,34,0.4)] active:scale-95 transition-all uppercase text-[11px] tracking-[0.2em] flex justify-center items-center gap-3">
                    Enter Canteen <span class="material-symbols-outlined text-sm">arrow_forward</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        function saveCollege() {
            localStorage.setItem('selectedCollege', document.getElementById('collegeSelect').value);
            localStorage.setItem('hasVisited', 'true');
            if (!localStorage.getItem('guestName')) {
                localStorage.setItem('guestName', 'Student');
                localStorage.setItem('studentId', '000');
                localStorage.setItem('department', 'CS');
            }
            window.location.href = "menu.html";
        }
    </script>
</body>
</html>
