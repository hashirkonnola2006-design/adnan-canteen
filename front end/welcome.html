<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Welcome | RUCHI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = { theme: { extend: { colors: { "primary": "#9f4122", "background": "#fff5f2", "accent": "#ff8a65", "teal": "#00bfae" } } } }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; scroll-behavior: smooth; margin: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        .mobile-container { width: 100%; max-width: 414px; height: 100vh; background-color: #fff5f2; position: relative; overflow-x: hidden; overflow-y: auto; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); display: flex; flex-direction: column; justify-content: center; padding: 2rem; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body>
    <div class="mobile-container">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-gray-900 tracking-tight leading-none mb-2">Welcome to <span class="text-primary">Ruchi Canteen</span></h1>
            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest" id="college-label">College</p>
        </div>
        <div class="glass-card rounded-[2rem] p-6 shadow-xl space-y-4">
            
            <button onclick="simulateGoogleLogin()" class="w-full bg-white border border-gray-200 text-gray-800 font-bold py-3.5 rounded-full shadow-sm active:scale-95 transition-all text-sm flex justify-center items-center gap-3">
                <svg viewBox="0 0 24 24" class="w-5 h-5"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continue with Google
            </button>

            <button onclick="loginAsGuest()" class="w-full bg-primary text-white font-black py-4 rounded-full shadow-lg active:scale-95 transition-all uppercase text-xs tracking-widest flex justify-center items-center gap-2">
                Login as Guest <span class="material-symbols-outlined text-sm">person</span>
            </button>

            <div class="text-center pt-3 border-t border-gray-200 mt-2">
                <a href="owner-login.html" class="text-xs font-bold text-gray-500 hover:text-primary transition-colors">Are you an owner?</a>
            </div>
        </div>
    </div>

    <!-- Google Login Simulator Modal -->
    <div id="google-modal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 backdrop-blur-sm px-5">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl transform scale-95 transition-transform duration-300" id="google-modal-content">
            <div class="text-center mb-6">
                <svg viewBox="0 0 24 24" class="w-8 h-8 mx-auto mb-2"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                <h3 class="text-xl font-bold text-gray-900">Sign in with Google</h3>
                <p class="text-xs font-medium text-gray-500 mt-1">to continue to Ruchi Canteen</p>
            </div>
            <input type="text" id="g-name" placeholder="Your Name" value="Adnan" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm font-bold text-gray-800 outline-none focus:ring-2 focus:ring-blue-500 mb-3">
            <input type="email" id="g-email" placeholder="Email Address" value="adnan@student.coet.edu" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm font-bold text-gray-800 outline-none focus:ring-2 focus:ring-blue-500 mb-6">
            <button onclick="processGoogleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-colors text-sm">Next</button>
            <button onclick="closeGoogleModal()" class="w-full text-xs font-bold text-gray-500 mt-4">Cancel</button>
        </div>
    </div>

    <!-- Complete Profile Modal -->
    <div id="profile-modal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 backdrop-blur-sm px-5">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl transform scale-95 transition-transform duration-300" id="profile-modal-content">
            <h3 class="text-xl font-black text-gray-900 mb-1">Complete Profile</h3>
            <p class="text-xs font-medium text-gray-500 mb-6">Almost done! Just need a bit more info.</p>
            <input type="text" id="p-dept" placeholder="Department (e.g., CS)" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm font-bold text-gray-800 outline-none focus:ring-2 focus:ring-primary mb-3">
            <input type="text" id="p-id" placeholder="Student ID" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm font-bold text-gray-800 outline-none focus:ring-2 focus:ring-primary mb-6">
            <button onclick="submitProfile()" class="w-full bg-primary hover:bg-accent text-white font-bold py-3 rounded-xl transition-colors text-sm uppercase tracking-widest">Finish Sign Up</button>
        </div>
    </div>

    <script>
        window.onload = () => { 
            if (localStorage.getItem('studentName')) {
                window.location.href = "menu.html";
                return;
            }
            document.getElementById('college-label').innerText = localStorage.getItem('selectedCollege') || 'Canteen'; 
        };
        
        let tempUser = {};

        function simulateGoogleLogin() {
            document.getElementById('google-modal').classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('google-modal-content').classList.remove('scale-95');
        }

        function closeGoogleModal() {
            document.getElementById('google-modal').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('google-modal-content').classList.add('scale-95');
        }

        async function processGoogleLogin() {
            const name = document.getElementById('g-name').value;
            const email = document.getElementById('g-email').value;
            if(!name || !email) return alert("Please enter name and email");
            
            tempUser = { name, email };
            closeGoogleModal();
            
            try {
                const res = await fetch('http://localhost:5000/api/users/sync', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, name })
                });
                
                if (res.status === 202) {
                    // New user, needs info
                    setTimeout(() => {
                        document.getElementById('profile-modal').classList.remove('opacity-0', 'pointer-events-none');
                        document.getElementById('profile-modal-content').classList.remove('scale-95');
                    }, 300);
                } else if (res.ok) {
                    const data = await res.json();
                    saveAndRedirect(data.name, data.student_id, data.department);
                }
            } catch(e) { console.error(e); alert("Server error"); }
        }

        async function submitProfile() {
            const dept = document.getElementById('p-dept').value;
            const stid = document.getElementById('p-id').value;
            if(!dept || !stid) return alert("Please fill all fields");
            
            try {
                const res = await fetch('http://localhost:5000/api/users/sync', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: tempUser.email, name: tempUser.name, department: dept, student_id: stid })
                });
                if(res.ok) {
                    saveAndRedirect(tempUser.name, stid, dept);
                }
            } catch(e) { console.error(e); }
        }

        function saveAndRedirect(name, id, dept) {
            localStorage.setItem('studentName', name);
            localStorage.setItem('studentId', id);
            localStorage.setItem('department', dept);
            window.location.href = "menu.html";
        }

        function loginAsGuest() {
            const uniqueGuestId = 'GUEST_' + Math.floor(Math.random() * 10000000);
            localStorage.removeItem('smartCanteenCart');
            saveAndRedirect('Guest User', uniqueGuestId, 'Guest');
        }
    </script>
</body>
</html>
