<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Checkout | RUCHI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { "primary": "#9f4122", "background": "#fff5f2", "accent": "#ff8a65", "teal": "#00bfae", "success": "#10b981" } } } }
    </script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="./firebase-config.js"></script>
    <style>
        :root {
            --primary: #9f4122;
            --primary-light: #fff5f2;
            --accent: #ff8a65;
            --surface: #ffffff;
            --background: #fafafa;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f3f4f6; 
            scroll-behavior: smooth; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            justify-content: center;
            color: #1a1a1a;
        }

        .mobile-container { 
            width: 100%; 
            max-width: 414px; 
            height: 100vh; 
            background-color: var(--background); 
            position: relative; 
            overflow-x: hidden; 
            overflow-y: auto; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); 
            padding-bottom: 120px;
        }

        .glass-card { 
            background: var(--surface); 
            border: 1px solid rgba(0, 0, 0, 0.03);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-item {
            position: relative;
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            -webkit-tap-highlight-color: transparent;
        }

        .payment-option.selected { 
            border-color: var(--primary); 
            background-color: var(--primary-light); 
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <header class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-[414px] z-40 bg-white/80 backdrop-blur-2xl shadow-sm px-5 py-4 flex items-center gap-3">
            <button onclick="window.history.back()" class="w-8 h-8 flex items-center justify-center bg-gray-100 rounded-full active:scale-95"><span class="material-symbols-outlined text-xl text-gray-700">arrow_back</span></button>
            <h1 class="text-xl font-black text-gray-900 tracking-tight leading-none">Checkout</h1>
        </header>

        <main class="relative z-10 px-5 pt-20 pb-6 space-y-6">
            <div class="glass-card rounded-[2rem] p-6 shadow-sm">
                <h3 class="text-sm font-extrabold text-gray-900 uppercase tracking-widest mb-4">Order Summary</h3>
                <div id="cart-items" class="space-y-3 mb-4"></div>
                <div class="border-t border-gray-200 pt-4 flex justify-between items-center">
                    <span class="text-sm font-bold text-gray-500 uppercase tracking-widest">Total Pay</span>
                    <span class="text-2xl font-black text-primary">₹<span id="cart-total">0</span></span>
                </div>
            </div>

            <div class="glass-card rounded-[2rem] p-6 shadow-sm">
                <h3 class="text-sm font-extrabold text-gray-900 uppercase tracking-widest mb-4">Payment Method</h3>
                <div class="space-y-3">
                    <div class="payment-option selected border-2 border-transparent bg-white/50 p-4 rounded-xl flex items-center gap-3 cursor-pointer" onclick="selectPayment('upi')">
                        <span class="material-symbols-outlined text-blue-500">qr_code_scanner</span>
                        <div><p class="text-sm font-bold text-gray-900">UPI Apps</p><p class="text-[10px] font-bold text-gray-500 uppercase">GPay, PhonePe, Paytm</p></div>
                    </div>
                </div>
            </div>

            <button onclick="processPayment()" id="pay-btn" class="w-full bg-primary text-white font-black py-4 rounded-full shadow-[0_15px_30px_rgba(159,65,34,0.3)] hover:scale-[1.02] active:scale-95 transition-all duration-200 uppercase text-xs tracking-widest flex items-center justify-center gap-2">
                Place Order <span class="material-symbols-outlined text-sm">arrow_forward</span>
            </button>
        </main>

        <!-- UPI Modal -->
        <div id="upi-modal" class="fixed inset-0 z-[100] bg-gray-900/40 backdrop-blur-sm transition-opacity duration-300 opacity-0 pointer-events-none flex items-end">
            <div class="w-full max-w-[414px] mx-auto bg-white rounded-t-[2rem] p-6 transform transition-transform duration-300 translate-y-full shadow-2xl" id="upi-sheet">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-black text-gray-900">Pay via UPI</h3>
                    <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center bg-gray-100 rounded-full"><span class="material-symbols-outlined">close</span></button>
                </div>
                <div class="flex flex-col items-center mb-6">
                    <div class="p-3 bg-white border-2 border-gray-100 rounded-2xl shadow-sm mb-4" id="qrcode"></div>
                    <p class="text-2xl font-black text-primary mb-1">₹<span id="upi-amount">0</span></p>
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Scan with any UPI app</p>
                </div>
                <div class="grid grid-cols-3 gap-3 mb-6">
                    <a id="link-gpay" class="bg-gray-50 border border-gray-200 py-3 rounded-xl flex flex-col items-center gap-1 active:bg-gray-100"><img src="https://upload.wikimedia.org/wikipedia/commons/f/f2/Google_Pay_Logo.svg" class="h-6 object-contain" alt="GPay"><span class="text-[10px] font-bold text-gray-600">GPay</span></a>
                    <a id="link-phonepe" class="bg-gray-50 border border-gray-200 py-3 rounded-xl flex flex-col items-center gap-1 active:bg-gray-100"><img src="https://upload.wikimedia.org/wikipedia/commons/7/71/PhonePe_Logo.svg" class="h-6 object-contain" alt="PhonePe"><span class="text-[10px] font-bold text-gray-600">PhonePe</span></a>
                    <a id="link-paytm" class="bg-gray-50 border border-gray-200 py-3 rounded-xl flex flex-col items-center gap-1 active:bg-gray-100"><img src="https://upload.wikimedia.org/wikipedia/commons/2/24/Paytm_Logo_%28standalone%29.svg" class="h-6 object-contain" alt="Paytm"><span class="text-[10px] font-bold text-gray-600">Paytm</span></a>
                </div>
                <button onclick="closeModal()" class="w-full bg-success text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition-all uppercase text-xs tracking-widest">I have made the payment</button>
            </div>
        </div>

        <!-- Order Confirmed Modal -->
        <div id="order-confirmed-modal" class="fixed inset-0 z-[100] bg-gray-900/40 backdrop-blur-sm transition-opacity duration-300 opacity-0 pointer-events-none flex items-center justify-center px-4">
            <div class="w-full max-w-[340px] bg-white rounded-3xl p-6 transform transition-transform duration-300 scale-95 shadow-2xl flex flex-col items-center text-center" id="order-confirmed-sheet">
                <div class="w-16 h-16 bg-success/10 text-success rounded-full flex items-center justify-center mb-4">
                    <span class="material-symbols-outlined text-3xl">check_circle</span>
                </div>
                <h3 class="text-xl font-black text-gray-900 mb-1">Order Placed!</h3>
                <h2 class="text-2xl font-black text-primary mb-2" id="display-token"></h2>
                <p class="text-xs font-bold text-gray-500 mb-6">Scan this QR at the counter to print your bill.</p>
                <div class="p-3 bg-white border-2 border-gray-100 rounded-2xl shadow-sm mb-6" id="order-qrcode"></div>
                <button onclick="window.location.href='orders.html'" class="w-full bg-gray-900 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition-all uppercase text-xs tracking-widest">Done</button>
            </div>
        </div>

    </div>

    <script>
        let cart = {};
        let totalAmount = 0;
        let selectedMethod = 'upi';
        let ownerUpi = "hashirkonnola2006@oksbi";

        function selectPayment(method) {
            selectedMethod = method;
            document.querySelectorAll('.payment-option').forEach(el => el.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
        }

        window.onload = async () => {
            if (typeof firebase !== "undefined" && firebase.database) {
                firebase.database().ref('settings').once('value', snap => {
                    const data = snap.val();
                    if (data && data.owner_upi) ownerUpi = data.owner_upi;
                });
            }

            const savedCart = localStorage.getItem('smartCanteenCart');
            if (savedCart) {
                cart = JSON.parse(savedCart);
                let count = 0;
                const container = document.getElementById('cart-items');
                Object.values(cart).forEach(item => {
                    count++;
                    totalAmount += (item.price * item.qty);
                    container.innerHTML += `<div class="flex justify-between items-center"><div class="flex items-center gap-3"><span class="text-xs font-black text-gray-500 bg-gray-100 px-2 py-1 rounded-md">${item.qty}x</span><p class="text-sm font-bold text-gray-900">${item.name}</p></div><span class="text-sm font-black text-gray-900">₹${item.price * item.qty}</span></div>`;
                });
                if (count === 0) { window.location.href = "menu.html"; }
                document.getElementById('cart-total').innerText = totalAmount;
                document.getElementById('upi-amount').innerText = totalAmount;
            } else { window.location.href = "menu.html"; }
        };

        async function processPayment() {
            const btn = document.getElementById('pay-btn');
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin text-sm">autorenew</span> Processing`;
            try {
                const orderId = Date.now();
                const newOrder = {
                    id: orderId,
                    order_id: orderId,
                    items: cart,
                    total: totalAmount,
                    studentName: localStorage.getItem('guestName') || 'Guest',
                    studentId: localStorage.getItem('studentId') || '000',
                    college: localStorage.getItem('selectedCollege') || 'College',
                    paymentMethod: selectedMethod,
                    status: 'pending',
                    date: new Date().toISOString(),
                    qr_scanned: 0
                };

                // Push to Firebase
                await firebase.database().ref('orders/' + orderId).set(newOrder);

                // Save reference locally for the student to see their own history
                const existingOrders = JSON.parse(localStorage.getItem('canteenOrders') || '[]');
                existingOrders.push(newOrder);
                localStorage.setItem('canteenOrders', JSON.stringify(existingOrders));

                localStorage.removeItem('smartCanteenCart');
                if (selectedMethod === 'cash') {
                    showOrderConfirmedModal(orderId);
                } else {
                    showUpiModal(orderId);
                }
                btn.innerHTML = `Place Order <span class="material-symbols-outlined text-sm">arrow_forward</span>`;
            } catch (err) { 
                alert("Failed to place order: " + err.message); 
                btn.innerHTML = `Place Order <span class="material-symbols-outlined text-sm">arrow_forward</span>`;
            }
        }

        function showUpiModal(orderId) {
            window.currentOrderId = orderId;
            const modal = document.getElementById('upi-modal');
            const sheet = document.getElementById('upi-sheet');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            sheet.classList.remove('translate-y-full');

            const upiUrl = `upi://pay?pa=${ownerUpi}&pn=Smart%20Canteen&tr=${orderId}&am=${totalAmount}&cu=INR&tn=Order%20${orderId}`;
            
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById('qrcode'), { text: upiUrl, width: 160, height: 160 });

            document.getElementById('link-gpay').href = upiUrl.replace('upi://pay', 'tez://upi/pay');
            document.getElementById('link-phonepe').href = upiUrl.replace('upi://pay', 'phonepe://pay');
            document.getElementById('link-paytm').href = upiUrl.replace('upi://pay', 'paytmmp://pay');
        }

        function showOrderConfirmedModal(orderId) {
            const modal = document.getElementById('order-confirmed-modal');
            const sheet = document.getElementById('order-confirmed-sheet');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            sheet.classList.remove('scale-95');
            sheet.classList.add('scale-100');

            document.getElementById('display-token').innerText = "Token " + orderId;
            document.getElementById('order-qrcode').innerHTML = "";
            new QRCode(document.getElementById('order-qrcode'), { 
                text: JSON.stringify({ orderId: orderId, status: "pending" }), 
                width: 180, 
                height: 180,
                colorDark : "#000000",
                colorLight : "#ffffff"
            });
        }

        function closeModal() { 
            document.getElementById('upi-modal').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('upi-sheet').classList.add('translate-y-full');
            setTimeout(() => {
                showOrderConfirmedModal(window.currentOrderId);
            }, 300);
        }
    </script>
</body>
</html>
