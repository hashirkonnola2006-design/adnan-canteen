<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Profile | RUCHI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { "primary": "#9f4122", "background": "#fff5f2", "accent": "#ff8a65", "teal": "#00bfae" } } } }
    </script>
    <style>
        :root {
            --primary: #9f4122;
            --primary-light: #fff5f2;
            --accent: #ff8a65;
            --surface: #ffffff;
            --background: #fafafa;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f3f4f6; 
            scroll-behavior: smooth; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            justify-content: center;
            color: #1a1a1a;
        }

        .mobile-container { 
            width: 100%; 
            max-width: 414px; 
            height: 100vh; 
            background-color: var(--background); 
            position: relative; 
            overflow-x: hidden; 
            overflow-y: auto; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); 
            padding-bottom: 120px;
        }

        .glass-card { 
            background: var(--surface); 
            border: 1px solid rgba(0, 0, 0, 0.03);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-active { 
            color: var(--primary); 
            background: var(--primary-light);
            box-shadow: 0 4px 12px rgba(159, 65, 34, 0.1);
        }

        .nav-inactive { color: #94a3b8; }

        .nav-item {
            position: relative;
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <header class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-[414px] z-40 bg-white/80 backdrop-blur-2xl shadow-sm px-5 py-4">
            <h1 class="text-xl font-black text-gray-900 tracking-tight leading-none">Profile</h1>
        </header>

        <main class="relative z-10 px-5 pt-24 pb-6 space-y-6">
            <div class="glass-card rounded-[2rem] p-6 shadow-sm flex flex-col items-center text-center">
                <div class="w-20 h-20 rounded-full bg-gradient-to-tr from-primary to-accent text-white flex items-center justify-center font-black text-2xl shadow-lg mb-4" id="avatar">ST</div>
                
                <div class="w-full space-y-4 text-left">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Full Name</label>
                        <input type="text" id="edit-name" class="w-full bg-white/50 border border-gray-200 rounded-xl px-4 py-3 text-sm font-bold text-gray-900 outline-none focus:ring-2 focus:ring-primary" placeholder="Enter your name">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Student ID</label>
                        <input type="text" id="edit-id" class="w-full bg-white/50 border border-gray-200 rounded-xl px-4 py-3 text-sm font-bold text-gray-900 outline-none focus:ring-2 focus:ring-primary" placeholder="e.g. 12345">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Department/Class</label>
                        <input type="text" id="edit-dept" class="w-full bg-white/50 border border-gray-200 rounded-xl px-4 py-3 text-sm font-bold text-gray-900 outline-none focus:ring-2 focus:ring-primary" placeholder="e.g. CS">
                    </div>
                    
                    <button onclick="saveProfile()" class="w-full bg-primary text-white font-black py-3 rounded-xl shadow-lg hover:scale-[1.02] active:scale-95 transition-all uppercase text-xs tracking-widest mt-2">
                        Save Profile
                    </button>
                    <p id="save-msg" class="text-xs font-bold text-success text-center opacity-0 transition-opacity">Profile saved successfully!</p>
                </div>
            </div>

            <div class="glass-card rounded-[2rem] p-4 shadow-sm space-y-2">
                <a href="owner-login.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/50 transition-colors">
                    <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center"><span class="material-symbols-outlined">admin_panel_settings</span></div>
                    <span class="text-sm font-bold text-gray-900">Admin Login</span>
                </a>
            </div>
        </main>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-40px)] max-w-[374px] z-50 h-20 bg-white/95 backdrop-blur-xl rounded-[2.5rem] border border-gray-100 shadow-[0_20px_50px_rgba(0,0,0,0.1)] flex items-center px-3">
            <a href="menu.html" class="nav-item">
                <div class="nav-inactive flex flex-col items-center justify-center w-14 h-14 transition-all duration-300 hover:scale-110">
                    <span class="material-symbols-outlined text-[24px]">home</span>
                    <span class="text-[9px] font-black uppercase tracking-[0.05em] mt-0.5">Home</span>
                </div>
            </a>
            <a href="orders.html" class="nav-item">
                <div class="nav-inactive flex flex-col items-center justify-center w-14 h-14 transition-all duration-300 hover:scale-110">
                    <span class="material-symbols-outlined text-[24px]">receipt_long</span>
                    <span class="text-[9px] font-black uppercase tracking-[0.05em] mt-0.5">Orders</span>
                </div>
            </a>
            <a href="profile.html" class="nav-item">
                <div class="nav-active flex flex-col items-center justify-center rounded-3xl w-14 h-14 transition-all duration-300">
                    <span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1">person</span>
                    <span class="text-[9px] font-black uppercase tracking-[0.05em] mt-0.5">Profile</span>
                </div>
            </a>
        </nav>
    </div>

    <script>
        window.onload = () => {
            const name = localStorage.getItem('guestName') || '';
            const stId = localStorage.getItem('studentId') || '';
            const dept = localStorage.getItem('department') || '';
            const college = localStorage.getItem('selectedCollege') || 'COET Thalassery';
            
            document.getElementById('edit-name').value = name === 'Guest' ? '' : name;
            document.getElementById('edit-id').value = stId === '000' ? '' : stId;
            document.getElementById('edit-dept').value = dept === 'CS' ? '' : dept;
            
            updateAvatar(name || 'GU');
        };

        function updateAvatar(name) {
            const displayStr = name ? name.substring(0, 2).toUpperCase() : 'ST';
            document.getElementById('avatar').innerText = displayStr;
        }

        function saveProfile() {
            const name = document.getElementById('edit-name').value || 'Guest';
            const stId = document.getElementById('edit-id').value || '000';
            const dept = document.getElementById('edit-dept').value || 'CS';

            localStorage.setItem('guestName', name);
            localStorage.setItem('studentId', stId);
            localStorage.setItem('department', dept);

            updateAvatar(name);

            const msg = document.getElementById('save-msg');
            msg.classList.remove('opacity-0');
            setTimeout(() => {
                msg.classList.add('opacity-0');
            }, 2000);
        }
    </script>
</body>
</html>
