<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Menu | RUCHI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { "primary": "#9f4122", "background": "#fff5f2", "accent": "#ff8a65", "teal": "#00bfae" } } } }
    </script>
    <style>
        :root {
            --primary: #9f4122;
            --primary-light: #fff5f2;
            --accent: #ff8a65;
            --surface: #ffffff;
            --background: #fafafa;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f3f4f6; 
            scroll-behavior: smooth; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            justify-content: center;
            color: #1a1a1a;
        }

        .mobile-container { 
            width: 100%; 
            max-width: 414px; 
            height: 100vh; 
            background-color: var(--background); 
            position: relative; 
            overflow-x: hidden; 
            overflow-y: auto; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); 
            padding-bottom: 120px;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .glass-card { 
            background: var(--surface); 
            border: 1px solid rgba(0, 0, 0, 0.03);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:active {
            transform: scale(0.98);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-up { animation: fadeUp 0.5s ease forwards; }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .nav-active { 
            color: var(--primary); 
            background: var(--primary-light);
            box-shadow: 0 4px 12px rgba(159, 65, 34, 0.1);
        }

        .nav-inactive { color: #94a3b8; }

        .category-chip {
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .chip-active {
            background: var(--primary);
            color: white;
            box-shadow: 0 8px 16px rgba(159, 65, 34, 0.2);
        }

        .chip-inactive {
            background: white;
            color: #64748b;
            border-color: #f1f5f9;
        }

        .add-btn {
            background: white;
            border: 1px solid #e2e8f0;
            color: #1e293b;
            font-weight: 800;
            transition: all 0.2s ease;
        }

        .add-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .qty-controls {
            background: var(--primary);
            box-shadow: 0 4px 12px rgba(159, 65, 34, 0.2);
        }

        /* Improved Navigation Hit Area */
        .nav-item {
            position: relative;
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="./firebase-config.js"></script>
</head>

<body>
    <div class="mobile-container">
        <div class="absolute inset-0 z-0 pointer-events-none fixed">
            <div class="absolute top-[-5%] left-[-10%] w-[60%] h-[60%] rounded-full bg-accent/10 blur-[80px] blob-1">
            </div>
            <div class="absolute bottom-[-5%] right-[-10%] w-[50%] h-[50%] rounded-full bg-teal/10 blur-[80px] blob-2">
            </div>
        </div>

        <header
            class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-[414px] z-40 bg-white/80 backdrop-blur-2xl shadow-sm px-5 py-4 pb-3">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="text-xl font-black text-gray-900 tracking-tight leading-none">Menu</h1>
                    <p class="text-[10px] font-bold text-primary uppercase tracking-widest mt-1" id="college-tagline">
                        College</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-primary to-accent text-white flex items-center justify-center font-bold text-sm shadow-md"
                    id="user-avatar">ST</div>
            </div>

            <div class="relative mb-6">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <span class="material-symbols-outlined text-gray-400 text-xl">search</span>
                </div>
                <input type="text" id="searchInput" placeholder="Search for your favorite food..."
                    class="w-full bg-white border border-gray-100 rounded-2xl pl-12 pr-4 py-3.5 text-sm font-semibold text-gray-700 shadow-sm outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary/30 transition-all placeholder:text-gray-400"
                    oninput="filterMenu()">
            </div>

            <div class="flex gap-2 overflow-x-auto scrollbar-hide pb-1" id="category-filters">
                <button onclick="setCategory('All')"
                    class="category-chip chip-active px-4 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-widest whitespace-nowrap shadow-sm transition-colors">All</button>
                <button onclick="setCategory('Meals')"
                    class="category-chip chip-inactive px-4 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-widest whitespace-nowrap shadow-sm transition-colors">Meals</button>
                <button onclick="setCategory('Snacks')"
                    class="category-chip chip-inactive px-4 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-widest whitespace-nowrap shadow-sm transition-colors">Snacks</button>
                <button onclick="setCategory('Drinks')"
                    class="category-chip chip-inactive px-4 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-widest whitespace-nowrap shadow-sm transition-colors">Drinks</button>
            </div>
        </header>

        <main class="relative z-10 px-5 pt-[180px] pb-6">
            <div id="loading-spinner" class="flex flex-col items-center justify-center py-10 opacity-60">
                <span class="material-symbols-outlined animate-spin text-3xl text-primary mb-2">autorenew</span>
                <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">Loading Menu...</span>
            </div>
            <div class="grid grid-cols-2 gap-4" id="menu-grid"></div>
        </main>

        <div id="cart-bar"
            class="fixed bottom-[90px] left-1/2 -translate-x-1/2 w-[calc(100%-2.5rem)] max-w-[374px] z-[60] bg-gray-900 text-white rounded-2xl p-4 shadow-xl flex items-center justify-between transition-transform duration-300 translate-y-24 opacity-0">
            <div>
                <p class="text-xs font-medium text-gray-300"><span id="cart-count" class="font-bold text-white">0</span>
                    items</p>
                <p class="text-lg font-black tracking-tight">₹<span id="cart-total">0</span></p>
            </div>
            <button onclick="goToCheckout()"
                class="bg-primary hover:bg-accent transition-colors px-6 py-2.5 rounded-xl text-xs font-bold uppercase tracking-widest flex items-center gap-1">
                View Cart <span class="material-symbols-outlined text-sm">chevron_right</span>
            </button>
        </div>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-40px)] max-w-[374px] z-50 h-20 bg-white/95 backdrop-blur-xl rounded-[2.5rem] border border-gray-100 shadow-[0_20px_50px_rgba(0,0,0,0.1)] flex items-center px-3">
            <a href="menu.html" class="nav-item">
                <div class="nav-active flex flex-col items-center justify-center rounded-3xl w-14 h-14 transition-all duration-300">
                    <span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1">home</span>
                    <span class="text-[9px] font-black uppercase tracking-[0.05em] mt-0.5">Home</span>
                </div>
            </a>
            <a href="orders.html" class="nav-item">
                <div class="nav-inactive flex flex-col items-center justify-center w-14 h-14 transition-all duration-300 hover:scale-110">
                    <span class="material-symbols-outlined text-[24px]">receipt_long</span>
                    <span class="text-[9px] font-black uppercase tracking-[0.05em] mt-0.5">Orders</span>
                </div>
            </a>
            <a href="profile.html" class="nav-item">
                <div class="nav-inactive flex flex-col items-center justify-center w-14 h-14 transition-all duration-300 hover:scale-110">
                    <span class="material-symbols-outlined text-[24px]">person</span>
                    <span class="text-[9px] font-black uppercase tracking-[0.05em] mt-0.5">Profile</span>
                </div>
            </a>
        </nav>
    </div>

    <script>
        let menuData = [];
        let cart = {};
        let currentCategory = 'All';

        function initFirebaseAndFetchMenu() {
            console.log("Firebase connection process starting...");
            if (typeof firebase === "undefined" || !firebase.database) {
                console.error("Firebase SDK not loaded. Menu cannot be fetched.");
                document.getElementById('loading-spinner').innerHTML = `<span class="text-xs text-red-500 font-bold">Firebase not available.</span>`;
                return;
            }
            const db = firebase.database();
            // Realtime listener - auto-updates when admin changes menu
            db.ref('menu').on('value', snapshot => {
                const data = snapshot.val();
                console.log("Firebase snapshot received:", data);
                if (data) {
                    menuData = Object.keys(data)
                        .filter(key => data[key] && typeof data[key] === 'object')
                        .map(key => ({ _id: key, ...data[key] }));
                    
                    if (menuData.length > 0) {
                        document.getElementById('loading-spinner').style.display = 'none';
                        renderMenu();
                    } else {
                        console.warn("No valid menu items found in snapshot.");
                        document.getElementById('loading-spinner').innerHTML = `
                            <div class="flex flex-col items-center gap-2">
                                <span class="material-symbols-outlined text-3xl text-orange-400">restaurant_menu</span>
                                <span class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em]">Canteen is preparing menu...</span>
                            </div>`;
                    }
                } else {
                    console.warn("Snapshot is empty or null. No 'menu' node exists in Firebase.");
                    menuData = [];
                    document.getElementById('loading-spinner').innerHTML = `
                        <div class="flex flex-col items-center gap-2">
                            <span class="material-symbols-outlined text-3xl text-gray-300">hourglass_empty</span>
                            <span class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">Waiting for items...</span>
                        </div>`;
                }
            }, err => {
                console.error("Firebase fetch error:", err);
                document.getElementById('loading-spinner').innerHTML = `<span class="text-xs text-red-500 font-bold">Failed to load menu. Check console for details.</span>`;
            });
        }

        function renderMenu() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            const query = document.getElementById('searchInput').value.toLowerCase();

            const filtered = menuData.filter(item => {
                const matchCat = currentCategory === 'All' || item.category === currentCategory;
                const matchSearch = (item.name || '').toLowerCase().includes(query);
                return matchCat && matchSearch;
            }).sort((a, b) => {
                const aAvail = a.available !== false ? 1 : 0;
                const bAvail = b.available !== false ? 1 : 0;
                return bAvail - aAvail;
            });

            filtered.forEach((item, i) => {
                const qty = cart[item._id]?.qty || 0;
                const available = item.available !== false; // Check boolean false
                grid.innerHTML += `
                <div class="glass-card rounded-[2rem] p-4 flex flex-col fade-up relative overflow-hidden ${!available ? 'opacity-60 grayscale' : ''}" style="animation-delay: ${i * 50}ms">
                    ${!available ? '<div class="absolute top-8 -right-8 bg-black text-white text-[8px] font-black uppercase tracking-[0.2em] px-10 py-1 rotate-45 shadow-lg z-20">Sold Out</div>' : ''}
                    <div class="aspect-square rounded-2xl bg-gray-50 mb-4 overflow-hidden relative shadow-inner">
                        ${!available ? '<div class="absolute inset-0 bg-white/20 z-10 backdrop-blur-[1px]"></div>' : ''}
                        <img src="${item.img || 'https://via.placeholder.com/400'}" class="w-full h-full object-cover transition-transform duration-500 hover:scale-110" alt="${item.name || 'item'}" loading="lazy"/>
                    </div>
                    <div class="flex-1 px-1">
                        <div class="text-[10px] font-extrabold text-primary uppercase tracking-[0.1em] mb-1.5 opacity-80">${item.category || 'Other'}</div>
                        <h3 class="font-bold text-[15px] text-gray-900 leading-tight mb-2">${item.name || 'Unnamed Item'}</h3>
                        <p class="text-xl font-black text-gray-900">₹${item.price || 0}</p>
                    </div>
                    <div class="mt-4">
                        ${!available ?
                        `<button disabled class="w-full bg-gray-100 text-gray-400 font-black py-3 rounded-2xl text-[10px] uppercase tracking-widest cursor-not-allowed">Finished</button>`
                        : (qty === 0
                            ? `<button onclick="updateCart('${item._id}', 1, ${item.price}, '${item.name}')" class="add-btn w-full py-3 rounded-2xl text-[11px] transition-all active:scale-95 shadow-sm uppercase tracking-widest">Add to Cart</button>`
                            : `<div class="qty-controls w-full flex items-center justify-between text-white rounded-2xl overflow-hidden shadow-lg">
                                <button onclick="updateCart('${item._id}', -1, ${item.price}, '${item.name}')" class="w-1/3 py-3 flex items-center justify-center hover:bg-black/10 active:bg-black/20 transition-colors"><span class="material-symbols-outlined text-sm">remove</span></button>
                                <span class="text-sm font-black w-1/3 text-center">${qty}</span>
                                <button onclick="updateCart('${item._id}', 1, ${item.price}, '${item.name}')" class="w-1/3 py-3 flex items-center justify-center hover:bg-black/10 active:bg-black/20 transition-colors"><span class="material-symbols-outlined text-sm">add</span></button>
                               </div>`
                        )}
                    </div>
                </div>`;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `
                <div class="col-span-2 flex flex-col items-center justify-center py-12 text-center">
                    <span class="material-symbols-outlined text-5xl text-gray-200 mb-3">search_off</span>
                    <p class="text-sm font-bold text-gray-500">No items found</p>
                    <p class="text-[10px] font-medium text-gray-400 uppercase tracking-widest mt-1">Try a different category or search term</p>
                </div>`;
            }
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-chip').forEach(btn => {
                if (btn.innerText === cat) {
                    btn.classList.replace('chip-inactive', 'chip-active');
                } else {
                    btn.classList.replace('chip-active', 'chip-inactive');
                }
            });
            renderMenu();
        }

        function filterMenu() { renderMenu(); }

        function updateCart(id, change, price, name) {
            if (!cart[id]) cart[id] = { qty: 0, price: price, name: name };
            cart[id].qty += change;
            if (cart[id].qty <= 0) delete cart[id];
            saveCart();
            renderMenu();
            updateCartUI();
        }

        function saveCart() { localStorage.setItem('smartCanteenCart', JSON.stringify(cart)); }

        function updateCartUI() {
            let count = 0; let total = 0;
            Object.values(cart).forEach(item => { count += item.qty; total += (item.qty * item.price); });
            const bar = document.getElementById('cart-bar');
            if (count > 0) {
                document.getElementById('cart-count').innerText = count;
                document.getElementById('cart-total').innerText = total;
                bar.classList.remove('translate-y-24', 'opacity-0');
            } else {
                bar.classList.add('translate-y-24', 'opacity-0');
            }
        }

        function goToCheckout() { window.location.href = "checkout.html"; }

        window.onload = () => {
            let college = localStorage.getItem('selectedCollege') || 'COET Thalassery';
            if (college === 'CoE Thalassery') college = 'COET Thalassery';
            document.getElementById('college-tagline').innerText = college;
            const name = localStorage.getItem('guestName') || 'Guest';
            document.getElementById('user-avatar').innerText = name.substring(0, 2).toUpperCase();
            const savedCart = localStorage.getItem('smartCanteenCart');
            if (savedCart) { cart = JSON.parse(savedCart); updateCartUI(); }
            initFirebaseAndFetchMenu();
        };
    </script>
</body>

</html>
