<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Menu | RUCHI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = { theme: { extend: { colors: { "primary": "#9f4122", "background": "#fff5f2", "accent": "#ff8a65", "teal": "#00bfae" } } } }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f3f4f6;
            scroll-behavior: smooth;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        .mobile-container {
            width: 100%;
            max-width: 414px;
            height: 100vh;
            background-color: #fff5f2;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding-bottom: 140px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .blob-1 {
            animation: float 14s ease-in-out infinite alternate;
        }

        .blob-2 {
            animation: float 18s ease-in-out infinite alternate-reverse;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(-30px, 30px) scale(1.1);
            }

            100% {
                transform: translate(30px, -20px) scale(0.95);
            }
        }

        .fade-up {
            animation: fadeUp 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .nav-active {
            color: #9f4122;
            background: rgba(159, 65, 34, 0.1);
        }

        .nav-inactive {
            color: #a1a1aa;
        }

        .chip-active {
            background-color: #9f4122;
            color: white;
        }

        .chip-inactive {
            background-color: white;
            color: #52525b;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="../firebase-config.js"></script>
</head>

<body>
    <div class="mobile-container">
        <div class="absolute inset-0 z-0 pointer-events-none fixed">
            <div class="absolute top-[-5%] left-[-10%] w-[60%] h-[60%] rounded-full bg-accent/10 blur-[80px] blob-1">
            </div>
            <div class="absolute bottom-[-5%] right-[-10%] w-[50%] h-[50%] rounded-full bg-teal/10 blur-[80px] blob-2">
            </div>
        </div>

        <header
            class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-[414px] z-40 bg-white/80 backdrop-blur-2xl shadow-sm px-5 py-4 pb-3">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="text-xl font-black text-gray-900 tracking-tight leading-none">Menu</h1>
                    <p class="text-[10px] font-bold text-primary uppercase tracking-widest mt-1" id="college-tagline">
                        College</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-primary to-accent text-white flex items-center justify-center font-bold text-sm shadow-md"
                    id="user-avatar">ST</div>
            </div>

            <div class="relative mb-4">
                <span
                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">search</span>
                <input type="text" id="searchInput" placeholder="Search food..."
                    class="w-full bg-gray-100 border-none rounded-xl pl-10 pr-4 py-2.5 text-sm font-medium text-gray-700 outline-none focus:ring-2 focus:ring-primary/30 transition-all"
                    oninput="filterMenu()">
            </div>

            <div class="flex gap-2 overflow-x-auto scrollbar-hide pb-1" id="category-filters">
                <button onclick="setCategory('All')"
                    class="category-chip chip-active px-4 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-widest whitespace-nowrap shadow-sm transition-colors">All</button>
                <button onclick="setCategory('Meals')"
                    class="category-chip chip-inactive px-4 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-widest whitespace-nowrap shadow-sm transition-colors">Meals</button>
                <button onclick="setCategory('Snacks')"
                    class="category-chip chip-inactive px-4 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-widest whitespace-nowrap shadow-sm transition-colors">Snacks</button>
                <button onclick="setCategory('Drinks')"
                    class="category-chip chip-inactive px-4 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-widest whitespace-nowrap shadow-sm transition-colors">Drinks</button>
            </div>
        </header>

        <main class="relative z-10 px-5 pt-[180px] pb-6">
            <div id="loading-spinner" class="flex flex-col items-center justify-center py-10 opacity-60">
                <span class="material-symbols-outlined animate-spin text-3xl text-primary mb-2">autorenew</span>
                <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">Loading Menu...</span>
            </div>
            <div class="grid grid-cols-2 gap-4" id="menu-grid"></div>
        </main>

        <div id="cart-bar"
            class="fixed bottom-[90px] left-1/2 -translate-x-1/2 w-[calc(100%-2.5rem)] max-w-[374px] z-[60] bg-gray-900 text-white rounded-2xl p-4 shadow-xl flex items-center justify-between transition-transform duration-300 translate-y-24 opacity-0">
            <div>
                <p class="text-xs font-medium text-gray-300"><span id="cart-count" class="font-bold text-white">0</span>
                    items</p>
                <p class="text-lg font-black tracking-tight">₹<span id="cart-total">0</span></p>
            </div>
            <button onclick="goToCheckout()"
                class="bg-primary hover:bg-accent transition-colors px-6 py-2.5 rounded-xl text-xs font-bold uppercase tracking-widest flex items-center gap-1">
                View Cart <span class="material-symbols-outlined text-sm">chevron_right</span>
            </button>
        </div>

        <nav
            class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[414px] z-50 flex justify-around items-center px-2 pb-6 pt-3 bg-white/90 backdrop-blur-xl rounded-t-[2rem] border-t border-gray-100 shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
            <a href="menu.html" class="nav-active flex flex-col items-center rounded-2xl px-6 py-2 transition-all">
                <span class="material-symbols-outlined text-[22px] mb-1"
                    style="font-variation-settings: 'FILL' 1">home</span>
                <span class="text-[9px] font-bold uppercase tracking-widest">Home</span>
            </a>
            <a href="orders.html"
                class="nav-inactive hover:text-gray-900 flex flex-col items-center px-4 py-2 transition-all active:scale-95">
                <span class="material-symbols-outlined text-[22px] mb-1">receipt_long</span>
                <span class="text-[9px] font-bold uppercase tracking-widest">Orders</span>
            </a>
            <a href="profile.html"
                class="nav-inactive hover:text-gray-900 flex flex-col items-center px-4 py-2 transition-all active:scale-95">
                <span class="material-symbols-outlined text-[22px] mb-1">person</span>
                <span class="text-[9px] font-bold uppercase tracking-widest">Profile</span>
            </a>
        </nav>
    </div>

    <script>
        let menuData = [];
        let cart = {};
        let currentCategory = 'All';

        function initFirebaseAndFetchMenu() {
            const db = firebase.database();
            // Realtime listener - auto-updates when admin changes menu
            db.ref('menu').on('value', snapshot => {
                const data = snapshot.val();
                if (data) {
                    menuData = Object.keys(data).map(key => ({ _id: key, ...data[key] }));
                } else {
                    menuData = [];
                }
                document.getElementById('loading-spinner').style.display = 'none';
                renderMenu();
            }, err => {
                console.error(err);
                document.getElementById('loading-spinner').innerHTML = `<span class="text-xs text-red-500 font-bold">Failed to load menu.</span>`;
            });
        }

        function renderMenu() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            const query = document.getElementById('searchInput').value.toLowerCase();

            const filtered = menuData.filter(item => {
                const matchCat = currentCategory === 'All' || item.category === currentCategory;
                const matchSearch = item.name.toLowerCase().includes(query);
                return matchCat && matchSearch;
            }).sort((a, b) => {
                const aAvail = a.available !== false ? 1 : 0;
                const bAvail = b.available !== false ? 1 : 0;
                return bAvail - aAvail;
            });

            filtered.forEach((item, i) => {
                const qty = cart[item._id]?.qty || 0;
                const available = item.available !== false; // Check boolean false
                grid.innerHTML += `
                <div class="glass-card rounded-2xl p-3 flex flex-col fade-up relative overflow-hidden ${!available ? 'opacity-70 grayscale-[50%]' : ''}" style="animation-delay: ${i * 50}ms">
                    ${!available ? '<div class="absolute top-10 -right-8 bg-red-600 text-white text-[10px] font-black uppercase tracking-widest px-10 py-1 rotate-45 shadow-lg z-20 shadow-red-900/20">Sold Out</div>' : ''}
                    <div class="aspect-square rounded-xl bg-gray-100 mb-3 overflow-hidden relative">
                        ${!available ? '<div class="absolute inset-0 bg-black/40 z-10 flex items-center justify-center backdrop-blur-[2px]"><span class="text-white font-black tracking-widest uppercase text-xs border-2 border-white px-2 py-1 rounded">Finished</span></div>' : ''}
                        <img src="${item.img}" class="w-full h-full object-cover" alt="${item.name}" loading="lazy"/>
                    </div>
                    <div class="flex-1">
                        <div class="text-[9px] font-bold text-primary uppercase tracking-widest mb-1">${item.category}</div>
                        <h3 class="font-bold text-sm text-gray-900 leading-tight mb-1 ${!available ? 'line-through decoration-red-500/50' : ''}">${item.name}</h3>
                        <p class="text-lg font-black text-gray-900">₹${item.price}</p>
                    </div>
                    <div class="mt-3">
                        ${!available ?
                        `<button disabled class="w-full bg-gray-200 text-gray-400 font-bold py-2 rounded-xl text-xs uppercase tracking-widest cursor-not-allowed">Over</button>`
                        : (qty === 0
                            ? `<button onclick="updateCart('${item._id}', 1, ${item.price}, '${item.name}')" class="w-full bg-white border border-gray-200 hover:border-primary hover:text-primary text-gray-800 font-bold py-2 rounded-xl text-xs transition-all active:scale-95 shadow-sm">ADD</button>`
                            : `<div class="w-full flex items-center justify-between bg-primary text-white rounded-xl overflow-hidden shadow-sm">
                                <button onclick="updateCart('${item._id}', -1, ${item.price}, '${item.name}')" class="w-1/3 py-2 flex items-center justify-center hover:bg-black/10 active:bg-black/20"><span class="material-symbols-outlined text-sm">remove</span></button>
                                <span class="text-xs font-bold w-1/3 text-center">${qty}</span>
                                <button onclick="updateCart('${item._id}', 1, ${item.price}, '${item.name}')" class="w-1/3 py-2 flex items-center justify-center hover:bg-black/10 active:bg-black/20"><span class="material-symbols-outlined text-sm">add</span></button>
                               </div>`
                        )}
                    </div>
                </div>`;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-2 text-center py-10 text-gray-500 font-bold text-sm">No items found.</div>`;
            }
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-chip').forEach(btn => {
                if (btn.innerText === cat) {
                    btn.classList.replace('chip-inactive', 'chip-active');
                } else {
                    btn.classList.replace('chip-active', 'chip-inactive');
                }
            });
            renderMenu();
        }

        function filterMenu() { renderMenu(); }

        function updateCart(id, change, price, name) {
            if (!cart[id]) cart[id] = { qty: 0, price: price, name: name };
            cart[id].qty += change;
            if (cart[id].qty <= 0) delete cart[id];
            saveCart();
            renderMenu();
            updateCartUI();
        }

        function saveCart() { localStorage.setItem('smartCanteenCart', JSON.stringify(cart)); }

        function updateCartUI() {
            let count = 0; let total = 0;
            Object.values(cart).forEach(item => { count += item.qty; total += (item.qty * item.price); });
            const bar = document.getElementById('cart-bar');
            if (count > 0) {
                document.getElementById('cart-count').innerText = count;
                document.getElementById('cart-total').innerText = total;
                bar.classList.remove('translate-y-24', 'opacity-0');
            } else {
                bar.classList.add('translate-y-24', 'opacity-0');
            }
        }

        function goToCheckout() { window.location.href = "checkout.html"; }

        window.onload = () => {
            let college = localStorage.getItem('selectedCollege') || 'COET Thalassery';
            if (college === 'CoE Thalassery') college = 'COET Thalassery';
            document.getElementById('college-tagline').innerText = college;
            const name = localStorage.getItem('guestName') || 'Guest';
            document.getElementById('user-avatar').innerText = name.substring(0, 2).toUpperCase();
            const savedCart = localStorage.getItem('smartCanteenCart');
            if (savedCart) { cart = JSON.parse(savedCart); updateCartUI(); }
            initFirebaseAndFetchMenu();
        };
    </script>
</body>

</html>
