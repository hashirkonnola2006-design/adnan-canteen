<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Owner Login | RUCHI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = { theme: { extend: { colors: { "primary": "#9f4122", "background": "#fff5f2", "accent": "#ff8a65", "teal": "#00bfae" } } } }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; scroll-behavior: smooth; margin: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        .mobile-container { width: 100%; max-width: 414px; height: 100vh; background-color: #fff5f2; position: relative; overflow-x: hidden; overflow-y: auto; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body>
    <div class="mobile-container">
        <main class="w-full z-10 fade-in">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-white shadow-lg rounded-lg mb-4">
                    <span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">admin_panel_settings</span>
                </div>
                <h1 class="text-3xl font-extrabold tracking-tight text-gray-900 leading-tight">Admin Portal</h1>
            </div>

            <div class="glass-card rounded-3xl p-8 shadow-xl space-y-6">
                <div id="error-box" class="hidden bg-red-50 text-red-600 p-3 rounded-xl text-xs font-bold border border-red-200">Invalid credentials</div>

                <div class="space-y-4">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold uppercase tracking-[0.15em] text-gray-500 ml-1">Email</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg">mail</span>
                            <input id="email" type="email" placeholder="owner@ruchicoet.com" class="w-full bg-white/50 border border-white focus:ring-2 focus:ring-primary rounded-xl pl-10 pr-4 py-3.5 text-sm font-semibold text-gray-800 outline-none transition-all">
                        </div>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold uppercase tracking-[0.15em] text-gray-500 ml-1">Password</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg">lock</span>
                            <input id="password" type="password" placeholder="••••••••" class="w-full bg-white/50 border border-white focus:ring-2 focus:ring-primary rounded-xl pl-10 pr-4 py-3.5 text-sm font-semibold text-gray-800 outline-none transition-all">
                        </div>
                    </div>
                </div>

                <div class="pt-2">
                    <button onclick="login()" id="login-btn" class="w-full bg-primary text-white font-bold py-4 rounded-full shadow-[0_15px_30px_rgba(159,65,34,0.3)] hover:scale-[1.02] active:scale-95 transition-all duration-200 uppercase text-[11px] tracking-[0.15em] flex items-center justify-center gap-2">
                        Login to Dashboard <span class="material-symbols-outlined text-sm">arrow_forward</span>
                    </button>
                </div>
            </div>

            <div class="text-center mt-6">
                <a href="index.html" class="text-xs font-bold text-gray-500 hover:text-primary transition-colors">Back to app</a>
            </div>
        </main>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errorBox = document.getElementById('error-box');

            btn.innerHTML = `<span class="material-symbols-outlined animate-spin text-sm">autorenew</span> Logging in...`;
            btn.disabled = true;
            errorBox.classList.add('hidden');

            try {
                const res = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = 'owner-dashboard.html';
                } else { throw new Error('Invalid credentials'); }
            } catch (e) {
                errorBox.classList.remove('hidden');
                errorBox.innerText = e.message || 'Login failed';
                btn.innerHTML = `Login to Dashboard <span class="material-symbols-outlined text-sm">arrow_forward</span>`;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
